name: '💣 Terraform Demo Destroy'

on:
  workflow_dispatch:   # Manual trigger only (safety first!)

permissions:
  contents: read
  id-token: write

jobs:
  terraform-destroy:
    name: 'Terraform Destroy on GCP'
    runs-on: ubuntu-latest
    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      # -------------------------------
      # 📂 Checkout Repository
      # -------------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # -------------------------------
      # 🔑 Authenticate with Google Cloud
      # -------------------------------
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      # -------------------------------
      # ⚙️ Setup Terraform
      # -------------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # -------------------------------
      # 📦 Initialize Terraform Backend
      # -------------------------------
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.GCP_TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state"

      # -------------------------------
      # 📝 Terraform Plan (Destroy)
      # -------------------------------
      - name: Terraform Plan Destroy
        run: terraform plan -destroy
        continue-on-error: false

      # -------------------------------
      # 💣 Terraform Destroy
      # -------------------------------
      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      # -------------------------------
      # ✅ Post-Destroy Output
      # -------------------------------
      - name: Show Terraform Outputs
        run: terraform output || echo "No outputs available (resources destroyed)."
