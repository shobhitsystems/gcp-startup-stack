# ─────────────────────────────────────────────────────────────────────────────
# Terraform Destroy — gcp-startup-stack
#
# DANGER: This destroys ALL infrastructure in the target environment.
#
# Safety gates (three layers):
#   1. workflow_dispatch only — never runs automatically
#   2. Must type "DESTROY" exactly in the confirmation input
#   3. GitHub Environment "production" protection rule (requires reviewer approval)
#
# Flow:
#   1. validate    → confirm state is readable and credentials work
#   2. plan-destroy → runs terraform plan -destroy, shows what will be removed
#   3. approve     → GitHub Environment manual approval gate
#   4. destroy     → terraform destroy -auto-approve
#
# Required GitHub Secrets (same as deploy):
#   WIF_PROVIDER, CICD_SA_EMAIL, TF_STATE_BUCKET, GCP_PROJECT_ID
# ─────────────────────────────────────────────────────────────────────────────

name: "Terraform Destroy"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy"
        required: true
        type: choice
        options:
          - demo
          - staging
          - prod
      confirm_destroy:
        description: "⚠️  Type DESTROY to confirm. This is irreversible."
        required: true
        default: ""
        type: string
      reason:
        description: "Reason for destroying (for audit log)"
        required: true
        type: string

# Never cancel a destroy mid-run
concurrency:
  group: terraform-destroy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION:       "1.5.0"
  TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
  TF_VAR_env:        ${{ github.event.inputs.environment }}
  TF_INPUT:          "false"
  TF_IN_AUTOMATION:  "true"

jobs:
  # ─────────────────────────────────────────────
  # Guard: abort immediately if confirmation wrong
  # ─────────────────────────────────────────────
  guard:
    name: "🛡️  Safety Check"
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation string
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "::error::Confirmation failed. You must type exactly: DESTROY"
            echo "::error::You typed: '${{ github.event.inputs.confirm_destroy }}'"
            exit 1
          fi
          echo "✅ Confirmation accepted"
          echo ""
          echo "⚠️  DESTROY requested for environment: ${{ github.event.inputs.environment }}"
          echo "⚠️  Triggered by: ${{ github.actor }}"
          echo "⚠️  Reason: ${{ github.event.inputs.reason }}"

  # ─────────────────────────────────────────────
  # JOB 1: Plan the destroy (show what will die)
  # ─────────────────────────────────────────────
  plan-destroy:
    name: "📋 Plan Destroy"
    runs-on: ubuntu-latest
    needs: guard
    outputs:
      resource_count: ${{ steps.count.outputs.count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.CICD_SA_EMAIL }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/${{ github.event.inputs.environment }}"

      - name: Terraform Plan Destroy
        id: plan
        run: |
          terraform plan \
            -destroy \
            -out=destroy-plan \
            -var="env=${{ github.event.inputs.environment }}" \
            2>&1 | tee destroy_plan_output.txt

      - name: Count resources to be destroyed
        id: count
        run: |
          COUNT=$(grep -oP '\d+(?= to destroy)' destroy_plan_output.txt || echo "0")
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Resources that will be DESTROYED: $COUNT"

      - name: Upload destroy plan
        uses: actions/upload-artifact@v4
        with:
          name: destroy-plan-${{ github.run_id }}
          path: |
            destroy-plan
            destroy_plan_output.txt
          retention-days: 1   # short retention — destroy plans expire fast

      - name: Post destroy plan to summary
        run: |
          echo "## ⚠️  Terraform Destroy Plan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Environment:** \`${{ github.event.inputs.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "> **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "> **Reason:** ${{ github.event.inputs.reason }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 💥 Resources to be destroyed: ${{ steps.count.outputs.count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Full destroy plan — review before approving</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`hcl" >> $GITHUB_STEP_SUMMARY
          cat destroy_plan_output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 2: Approval gate
  # A human must review the destroy plan summary
  # and click "Approve" in the GitHub UI.
  # ─────────────────────────────────────────────
  approve-destroy:
    name: "🔐 Awaiting Destroy Approval"
    runs-on: ubuntu-latest
    needs: plan-destroy
    environment:
      name: production     # ← same environment — same reviewers must approve
    steps:
      - name: Approval granted
        run: |
          echo "✅ Destroy approved by: ${{ github.actor }}"
          echo "Environment  : ${{ github.event.inputs.environment }}"
          echo "Resources    : ${{ needs.plan-destroy.outputs.resource_count }}"
          echo "Reason       : ${{ github.event.inputs.reason }}"
          echo "Run ID       : ${{ github.run_id }}"

  # ─────────────────────────────────────────────
  # JOB 3: Destroy
  # Runs only after human approval
  # ─────────────────────────────────────────────
  destroy:
    name: "💥 Destroy"
    runs-on: ubuntu-latest
    needs: [plan-destroy, approve-destroy]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.CICD_SA_EMAIL }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/${{ github.event.inputs.environment }}"

      - name: Download destroy plan
        uses: actions/download-artifact@v4
        with:
          name: destroy-plan-${{ github.run_id }}

      - name: Terraform Destroy
        id: destroy
        run: terraform apply -auto-approve destroy-plan

      - name: Post destroy summary
        if: always()
        run: |
          STATUS="${{ steps.destroy.outcome }}"
          ICON=$([ "$STATUS" = "success" ] && echo "✅" || echo "❌")
          echo "## $ICON Destroy — $STATUS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ github.event.inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Approved by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Reason      | ${{ github.event.inputs.reason }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Resources   | ${{ needs.plan-destroy.outputs.resource_count }} destroyed |" >> $GITHUB_STEP_SUMMARY
          echo "| Run         | [\`${{ github.run_id }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY

      - name: Notify on destroy failure
        if: failure()
        run: |
          echo "::error::Destroy FAILED. Some resources may still exist in GCP."
          echo "::error::Check the GCP console immediately: https://console.cloud.google.com/home/dashboard?project=${{ secrets.GCP_PROJECT_ID }}"
          exit 1

      - name: Post-destroy reminder
        if: success()
        run: |
          echo ""
          echo "════════════════════════════════════════"
          echo "  DESTROY COMPLETE"
          echo "════════════════════════════════════════"
          echo ""
          echo "Reminder: The GCS state bucket was NOT deleted by Terraform."
          echo "If you no longer need this environment's state, delete manually:"
          echo ""
          echo "  gcloud storage rm -r gs://${{ secrets.TF_STATE_BUCKET }}/terraform/state/${{ github.event.inputs.environment }}/"
          echo ""
          echo "  (Or delete the entire bucket if all environments are gone)"
