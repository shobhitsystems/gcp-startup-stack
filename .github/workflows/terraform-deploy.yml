# ─────────────────────────────────────────────────────────────────────────────
# Terraform Deploy — gcp-startup-stack
#
# Flow:
#   1. validate   → fmt check + validate (fast, no GCP call)
#   2. plan       → terraform plan, saves plan file as artifact
#   3. approve    → manual approval gate (GitHub Environment protection rule)
#   4. apply      → terraform apply using the saved plan file
#   5. outputs    → capture and post outputs as job summary
#
# Triggers:
#   • Push to main  → runs validate + plan only (no auto-apply)
#   • Manual trigger (workflow_dispatch) → full pipeline including apply
#
# Required GitHub Secrets:
#   WIF_PROVIDER          — from: terraform output wif_provider
#   CICD_SA_EMAIL         — from: terraform output cicd_sa_email
#   TF_STATE_BUCKET       — GCS bucket name for Terraform state (no gs:// prefix)
#   GCP_PROJECT_ID        — your GCP project ID
#
# Required GitHub Environment:
#   "production"          — create at: Settings → Environments → New environment
#                           Add a "Required reviewers" protection rule with your username
# ─────────────────────────────────────────────────────────────────────────────

name: "Terraform Deploy"

on:
  push:
    branches:
      - main
    paths:
      - "**.tf"
      - "**.tfvars"
      - ".github/workflows/terraform-deploy.yml"

  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "prod"
        type: choice
        options:
          - prod
          - staging
          - demo
      confirm_apply:
        description: "Type APPLY to confirm you want to apply changes"
        required: true
        default: ""
        type: string

# Cancel in-progress runs on the same branch to avoid state conflicts
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false   # never cancel mid-apply — let it finish

permissions:
  contents: read
  id-token: write       # required for Workload Identity Federation
  pull-requests: write  # allows posting plan output as PR comment

env:
  TF_VERSION: "1.5.0"
  TF_VAR_project_id:  ${{ secrets.GCP_PROJECT_ID }}
  TF_VAR_env:         ${{ github.event.inputs.environment || 'prod' }}
  # Prevents interactive prompts
  TF_INPUT:           "false"
  TF_IN_AUTOMATION:   "true"

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Validate (runs on every push to main)
  # ─────────────────────────────────────────────
  validate:
    name: "✅ Validate"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.CICD_SA_EMAIL }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/${{ github.event.inputs.environment || 'prod' }}"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: false

      - name: Terraform Validate
        run: terraform validate

      - name: Post validate result to summary
        if: always()
        run: |
          echo "## ✅ Validate — ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ github.ref_name }}\`  ·  Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # JOB 2: Plan (runs after validate)
  # ─────────────────────────────────────────────
  plan:
    name: "📋 Plan"
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.CICD_SA_EMAIL }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/${{ github.event.inputs.environment || 'prod' }}"

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -detailed-exitcode \
            -out=tfplan \
            -var="env=${{ github.event.inputs.environment || 'prod' }}" \
            2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        # Exit codes: 0 = no changes, 1 = error, 2 = changes present

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: |
            tfplan
            plan_output.txt
          retention-days: 7

      - name: Parse plan summary
        id: summary
        run: |
          ADDED=$(grep -oP '(?<=Plan: )\d+(?= to add)' plan_output.txt || echo "0")
          CHANGED=$(grep -oP '\d+(?= to change)' plan_output.txt || echo "0")
          DESTROYED=$(grep -oP '\d+(?= to destroy)' plan_output.txt || echo "0")
          echo "added=$ADDED"      >> $GITHUB_OUTPUT
          echo "changed=$CHANGED"  >> $GITHUB_OUTPUT
          echo "destroyed=$DESTROYED" >> $GITHUB_OUTPUT

      - name: Post plan to job summary
        run: |
          echo "## 📋 Terraform Plan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| ➕ Resources to add    | \`${{ steps.summary.outputs.added }}\`     |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔄 Resources to change | \`${{ steps.summary.outputs.changed }}\`   |" >> $GITHUB_STEP_SUMMARY
          echo "| 💥 Resources to destroy| \`${{ steps.summary.outputs.destroyed }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "<details><summary>Full plan output</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`hcl" >> $GITHUB_STEP_SUMMARY
          cat plan_output.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY

      - name: Fail if plan has errors
        if: steps.plan.outputs.exitcode == '1'
        run: |
          echo "::error::Terraform plan failed. See plan output above."
          exit 1

      - name: Skip apply notice (push trigger)
        if: github.event_name == 'push'
        run: |
          echo "::notice::Plan complete. To apply, trigger this workflow manually (Actions → Terraform Deploy → Run workflow)."

  # ─────────────────────────────────────────────
  # JOB 3: Manual approval gate
  # Requires: GitHub Environment "production" with
  # "Required reviewers" protection rule set.
  # Only runs on workflow_dispatch (manual trigger).
  # ─────────────────────────────────────────────
  approve:
    name: "🔐 Awaiting Approval"
    runs-on: ubuntu-latest
    needs: plan
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.confirm_apply == 'APPLY' &&
      needs.plan.outputs.plan_exitcode != '1'
    environment:
      name: production     # ← This triggers the GitHub Environment approval gate
    steps:
      - name: Approval granted
        run: |
          echo "✅ Deployment approved by ${{ github.actor }}"
          echo "Environment : ${{ github.event.inputs.environment }}"
          echo "Run ID      : ${{ github.run_id }}"
          echo "Commit      : ${{ github.sha }}"

  # ─────────────────────────────────────────────
  # JOB 4: Apply (only after approval)
  # ─────────────────────────────────────────────
  apply:
    name: "🚀 Apply"
    runs-on: ubuntu-latest
    needs: [plan, approve]
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.confirm_apply == 'APPLY' &&
      needs.plan.outputs.plan_exitcode != '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.CICD_SA_EMAIL }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state/${{ github.event.inputs.environment || 'prod' }}"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve tfplan

      - name: Capture outputs
        id: tf_outputs
        run: |
          APP_URL=$(terraform output -raw app_url 2>/dev/null || echo "N/A")
          REGISTRY=$(terraform output -raw registry_host 2>/dev/null || echo "N/A")
          WIF=$(terraform output -raw wif_provider 2>/dev/null || echo "N/A")
          DB=$(terraform output -raw db_instance_name 2>/dev/null || echo "N/A")
          echo "app_url=$APP_URL"   >> $GITHUB_OUTPUT
          echo "registry=$REGISTRY" >> $GITHUB_OUTPUT
          echo "wif=$WIF"           >> $GITHUB_OUTPUT
          echo "db=$DB"             >> $GITHUB_OUTPUT

      - name: Post apply summary
        run: |
          echo "## 🚀 Apply Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Output | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| App URL           | \`${{ steps.tf_outputs.outputs.app_url }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact Registry | \`${{ steps.tf_outputs.outputs.registry }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| DB Instance       | \`${{ steps.tf_outputs.outputs.db }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| WIF Provider      | \`${{ steps.tf_outputs.outputs.wif }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Approved by: **${{ github.actor }}**  ·  Run: [\`${{ github.run_id }}\`](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Apply failed! The plan artifact was applied but Terraform reported errors."
          echo "::error::Check the GCP console and Terraform state for partial deployment."
          exit 1
