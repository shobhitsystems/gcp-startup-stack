name: '🚀 Terraform Enterprise Deploy'

# ==========================================
# 📊 PIPELINE FLOW:
# [ 🛠️ BUILD ] ⮕ [ 🧪 TEST/VALIDATE ] ⮕ [ 📝 PLAN ] ⮕ [ 🔒 APPROVAL ] ⮕ [ 🚀 DEPLOY ]
# ==========================================

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      confirm_apply:
        description: '⚠️ Type "APPLY" to enable deployment'
        required: true
        default: 'NO'

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  plan:
    name: '🔍 Inspection & Planning'
    runs-on: ubuntu-latest
    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
    steps:
      - name: '📦 Checkout Code'
        uses: actions/checkout@v4

      - name: '🔑 GCP Authentication'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.GCP_SA_EMAIL }}'

      - name: '🏗️ Setup Terraform'
        uses: hashicorp/setup-terraform@v3

      - name: '⚙️ Initialize Backend'
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.GCP_TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state"

      - name: '✨ Lint & Validate'
        run: |
          echo "### 🎨 Formatting Check" >> $GITHUB_STEP_SUMMARY
          terraform fmt -check && echo "✅ Passed" >> $GITHUB_STEP_SUMMARY || echo "❌ Failed" >> $GITHUB_STEP_SUMMARY
          
          echo "### 🛠️ Syntax Validation" >> $GITHUB_STEP_SUMMARY
          terraform validate && echo "✅ Passed" >> $GITHUB_STEP_SUMMARY || echo "❌ Failed" >> $GITHUB_STEP_SUMMARY

      - name: '📋 Generate Execution Plan'
        id: plan
        run: |
          terraform plan -no-color -out=tfplan > plan_output.txt
          echo "### 📝 Terraform Plan Summary" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY
          grep -E "Plan:|to add|to change|to destroy" plan_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: '💾 Archive Plan'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

  apply:
    name: '🚀 Live Deployment'
    needs: plan
    runs-on: ubuntu-latest
    environment: production # 🛑 This creates the fancy "Approve" button in GitHub
    if: github.event.inputs.confirm_apply == 'APPLY' || github.event_name == 'push'
    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
    steps:
      - name: '📦 Checkout Code'
        uses: actions/checkout@v4

      - name: '🔑 GCP Authentication'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.GCP_SA_EMAIL }}'

      - name: '🏗️ Setup Terraform'
        uses: hashicorp/setup-terraform@v3

      - name: '💾 Download Plan'
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: '⚙️ Initialize Backend'
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.GCP_TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/state"

      - name: '⚡ Execute Plan (Apply)'
        run: |
          terraform apply -auto-approve tfplan
          echo "## ✅ Deployment Successful!" >> $GITHUB_STEP_SUMMARY
