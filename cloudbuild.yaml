# =============================================================================
# cloudbuild.yaml — Terraform CI/CD for gcp-startup-stack
#
# Triggered by Cloud Build: init → fmt → validate → plan → apply/destroy
# =============================================================================
steps:
  # STEP 1 — terraform init
  - name: hashicorp/terraform:1.8.0
    id: tf-init
    entrypoint: terraform
    dir: .
    args:
      - init
      - -input=false
      - -backend-config=bucket=${_STATE_BUCKET}
      - -backend-config=prefix=gcp-startup-stack/state

  # STEP 2 — terraform fmt
  - name: hashicorp/terraform:1.8.0
    id: tf-fmt
    entrypoint: terraform
    dir: .
    waitFor: [tf-init]
    args:
      - fmt
      - -recursive

  # STEP 3 — terraform validate
  - name: hashicorp/terraform:1.8.0
    id: tf-validate
    entrypoint: terraform
    dir: .
    waitFor: [tf-fmt]
    args:
      - validate

  # STEP 4 — terraform plan
  - name: hashicorp/terraform:1.8.0
    id: tf-plan
    entrypoint: terraform
    dir: .
    waitFor: [tf-validate]
    args:
      - plan
      - -input=false
      - -var=project_id=${PROJECT_ID}
      - -out=plan.tfplan

  # STEP 5 — terraform apply (only runs if _ACTION=apply)
  - name: hashicorp/terraform:1.8.0
    id: tf-apply
    entrypoint: sh
    dir: .
    waitFor: [tf-plan]
    args:
      - -c
      - |
        if [ "${_ACTION}" = "apply" ]; then
          terraform apply -input=false plan.tfplan
        else
          echo "Skipping apply, action=${_ACTION}"
        fi

  # STEP 6 — terraform destroy (only runs if _ACTION=destroy)
  - name: hashicorp/terraform:1.8.0
    id: tf-destroy
    entrypoint: sh
    dir: .
    waitFor: [tf-validate]
    args:
      - -c
      - |
        if [ "${_ACTION}" = "destroy" ]; then
          terraform destroy -auto-approve -var=project_id=${PROJECT_ID}
        else
          echo "Skipping destroy, action=${_ACTION}"
        fi

  # STEP 7 — release temporary hold on Terraform lock file
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: release-hold
    entrypoint: sh
    dir: .
    waitFor: [tf-apply, tf-destroy]
    args:
      - -c
      - |
        echo "Releasing temporary hold on Terraform lock file..."
        gsutil retention temp release gs://${_STATE_BUCKET}/gcp-startup-stack/state/default.tflock || echo "No hold found, skipping."

options:
  logging: CLOUD_LOGGING_ONLY
timeout: 7200s
