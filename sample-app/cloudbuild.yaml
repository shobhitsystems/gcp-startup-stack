steps:
  # Step 1 — Run tests
  - name: node:20-alpine
    id: test
    dir: sample-app
    entrypoint: sh
    args: ["-c", "npm ci && npm test"]

  # Step 2 — Build Docker image tagged with commit SHA
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -t
      - ${_REGISTRY}/${_PROJECT_ID}/${_ENV}-images/${_IMAGE_NAME}:${SHORT_SHA}
      - -t
      - ${_REGISTRY}/${_PROJECT_ID}/${_ENV}-images/${_IMAGE_NAME}:latest
      - --cache-from
      - ${_REGISTRY}/${_PROJECT_ID}/${_ENV}-images/${_IMAGE_NAME}:latest
      - --label
      - git-commit=${COMMIT_SHA}
      - --label
      - build-id=${BUILD_ID}
      - --label
      - env=${_ENV}
      - sample-app/

  # Step 3 — Trivy security scan — blocks on CRITICAL CVE
  - name: aquasec/trivy:latest
    id: security-scan
    args:
      - image
      - --exit-code=1
      - --severity=CRITICAL
      - --no-progress
      - --ignore-unfixed
      - ${_REGISTRY}/${_PROJECT_ID}/${_ENV}-images/${_IMAGE_NAME}:${SHORT_SHA}

  # Step 4 — Push to Artifact Registry (only after scan passes)
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - ${_REGISTRY}/${_PROJECT_ID}/${_ENV}-images/${_IMAGE_NAME}

  # Step 5 — Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGISTRY}/${_PROJECT_ID}/${_ENV}-images/${_IMAGE_NAME}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --quiet

  # Step 6 — Smoke test with auto-rollback
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: smoke-test
    entrypoint: bash
    args:
      - -c
      - |
        URL=$(gcloud run services describe ${_SERVICE_NAME} \
          --region=${_REGION} --format='value(status.url)')
        echo "Testing ${URL}"
        for i in 1 2 3 4 5; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}")
          [ "$STATUS" = "200" ] && echo "✓ Smoke test passed (${URL})" && exit 0
          echo "Attempt $i: HTTP $STATUS — retrying in 5s..."
          sleep 5
        done
        echo "✗ Smoke test failed — rolling back to previous revision"
        gcloud run services update-traffic ${_SERVICE_NAME} \
          --region=${_REGION} --to-revisions=PREVIOUS=100
        exit 1

substitutions:
  _REGION: asia-south1
  _PROJECT_ID: your-project-id
  _ENV: demo
  _SERVICE_NAME: demo-app
  _REGISTRY: asia-south1-docker.pkg.dev
  _IMAGE_NAME: app

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
